services:
  postgres:
    image: postgres:18.3
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - /postgres_data:/var/lib/postgresql
    networks:
        - acciona
networks:
  acciona:
    external: true
