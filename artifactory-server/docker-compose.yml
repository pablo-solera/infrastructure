services:
  nexus:
    image: sonatype/nexus3:3.91.1
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"   # Web UI and REST API
      - "8082:8082"   # Docker hosted registry
      - "8083:8083"   # Docker proxy registry
    volumes:
      - nexus-data:/nexus-data
    environment:
      # JVM memory settings - adjust based on available RAM
      - INSTALL4J_ADD_VM_PARAMS=-Xms1g -Xmx2g -XX:MaxDirectMemorySize=2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    networks:
      - acciona

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexus.rule=Host(`${TRAEFIK_HOSTNAME}`)"
      - "traefik.http.routers.nexus.entrypoints=web"
      - "traefik.http.services.nexus.loadbalancer.server.port=8081"

volumes:
  nexus-data:   
